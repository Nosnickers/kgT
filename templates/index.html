<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识图谱问答系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .source-card {
            transition: all 0.2s ease;
        }
        .source-card:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="mb-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                    </svg>
                    <h1 class="text-3xl font-bold text-gray-800">知识图谱问答系统</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="statusIndicator" class="flex items-center space-x-2">
                        <span class="w-3 h-3 bg-gray-400 rounded-full"></span>
                        <span class="text-sm text-gray-600">检查中...</span>
                    </div>
                    <button onclick="checkHealth()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg text-sm font-medium transition-colors">
                        刷新状态
                    </button>
                </div>
            </div>
            <p class="mt-2 text-gray-600">基于向量检索和 LLM 的智能问答应用</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">提问</h2>
                    <div class="space-y-4">
                        <textarea 
                            id="queryInput" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                            rows="3"
                            placeholder="请输入您的问题..."
                        ></textarea>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-2">
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" id="useConversation" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-600">使用对话历史</span>
                                </label>
                            </div>
                            <div class="flex items-center space-x-2">
                                <button onclick="clearConversation()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg text-sm font-medium transition-colors">
                                    清空历史
                                </button>
                                <button onclick="submitQuery()" id="submitBtn" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors flex items-center space-x-2">
                                    <span>提交</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="answerSection" class="bg-white rounded-xl shadow-sm p-6 hidden">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">答案</h2>
                    <div id="answerContent" class="prose max-w-none text-gray-700">
                    </div>
                </div>

                <div id="sourcesSection" class="bg-white rounded-xl shadow-sm p-6 hidden">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">来源信息</h2>
                        <span id="sourceCount" class="text-sm text-gray-500"></span>
                    </div>
                    <div id="sourcesContent" class="space-y-3">
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <button onclick="toggleConfig()" class="w-full flex items-center justify-between text-left">
                        <h2 class="text-xl font-semibold text-gray-800">检索配置</h2>
                        <svg id="configToggleIcon" class="w-5 h-5 text-gray-500 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div id="configPanel" class="mt-4 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">检索模式</label>
                            <select id="retrievalMode" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                <option value="hybrid">混合检索（实体+关系）</option>
                                <option value="entity">仅实体</option>
                                <option value="relationship">仅关系</option>
                                <option value="contextual">上下文增强检索</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">返回数量 (Top-K)</label>
                            <input type="number" id="topK" value="5" min="1" max="20" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">最小相似度</label>
                            <input type="range" id="minSimilarity" min="0" max="1" step="0.1" value="0" class="w-full">
                            <div class="flex justify-between text-xs text-gray-500 mt-1">
                                <span>0.0</span>
                                <span id="similarityValue">0.0</span>
                                <span>1.0</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">实体类型过滤（逗号分隔）</label>
                            <input type="text" id="entityTypes" placeholder="例如: Character, Organization" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">关系类型过滤（逗号分隔）</label>
                            <input type="text" id="relationshipTypes" placeholder="例如: WORKS_FOR, PART_OF" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">系统统计</h2>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-gray-600">实体总数</span>
                            <span id="entityCount" class="font-semibold text-blue-600">-</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-gray-600">关系总数</span>
                            <span id="relationshipCount" class="font-semibold text-green-600">-</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">对话历史</h2>
                    <div id="conversationHistory" class="space-y-3 max-h-64 overflow-y-auto">
                        <p class="text-sm text-gray-500 text-center py-4">暂无对话历史</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let configVisible = true;

        document.addEventListener('DOMContentLoaded', function() {
            checkHealth();
            loadStats();
            loadConversationHistory();

            document.getElementById('minSimilarity').addEventListener('input', function() {
                document.getElementById('similarityValue').textContent = this.value;
            });

            document.getElementById('queryInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    submitQuery();
                }
            });
        });

        function toggleConfig() {
            configVisible = !configVisible;
            const panel = document.getElementById('configPanel');
            const icon = document.getElementById('configToggleIcon');
            
            if (configVisible) {
                panel.classList.remove('hidden');
                icon.classList.remove('rotate-180');
            } else {
                panel.classList.add('hidden');
                icon.classList.add('rotate-180');
            }
        }

        async function checkHealth() {
            const indicator = document.getElementById('statusIndicator');
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                if (data.status === 'ok') {
                    const allReady = Object.values(data.components).every(v => v);
                    indicator.innerHTML = `
                        <span class="w-3 h-3 ${allReady ? 'bg-green-500' : 'bg-yellow-500'} rounded-full"></span>
                        <span class="text-sm ${allReady ? 'text-green-600' : 'text-yellow-600'}">${allReady ? '系统就绪' : '部分组件未就绪'}</span>
                    `;
                } else {
                    indicator.innerHTML = `
                        <span class="w-3 h-3 bg-red-500 rounded-full"></span>
                        <span class="text-sm text-red-600">系统异常</span>
                    `;
                }
            } catch (error) {
                indicator.innerHTML = `
                    <span class="w-3 h-3 bg-red-500 rounded-full"></span>
                    <span class="text-sm text-red-600">连接失败</span>
                `;
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                if (data.status === 'success') {
                    document.getElementById('entityCount').textContent = data.entity_count;
                    document.getElementById('relationshipCount').textContent = data.relationship_count;
                }
            } catch (error) {
                console.error('加载统计信息失败:', error);
            }
        }

        async function loadConversationHistory() {
            try {
                const response = await fetch('/api/conversation-history');
                const data = await response.json();
                
                if (data.status === 'success' && data.data.length > 0) {
                    const historyContainer = document.getElementById('conversationHistory');
                    historyContainer.innerHTML = data.data.map((turn, index) => `
                        <div class="bg-gray-50 rounded-lg p-3 text-sm fade-in">
                            <div class="font-medium text-gray-700 mb-1">Q${index + 1}: ${turn.user}</div>
                            <div class="text-gray-600">A: ${turn.assistant.substring(0, 100)}...</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载对话历史失败:', error);
            }
        }

        async function submitQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                alert('请输入问题');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading-spinner"></span><span>查询中...</span>';
            submitBtn.disabled = true;

            const requestData = {
                query: query,
                retrieval_mode: document.getElementById('retrievalMode').value,
                top_k: parseInt(document.getElementById('topK').value),
                min_similarity: parseFloat(document.getElementById('minSimilarity').value),
                use_conversation: document.getElementById('useConversation').checked
            };

            const entityTypes = document.getElementById('entityTypes').value.trim();
            if (entityTypes) {
                requestData.entity_types = entityTypes.split(',').map(t => t.trim());
            }

            const relationshipTypes = document.getElementById('relationshipTypes').value.trim();
            if (relationshipTypes) {
                requestData.relationship_types = relationshipTypes.split(',').map(t => t.trim());
            }

            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    displayAnswer(result.data);
                    displaySources(result.data.sources);
                    loadConversationHistory();
                } else {
                    alert('查询失败: ' + result.message);
                }
            } catch (error) {
                alert('查询失败: ' + error.message);
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }

        function displayAnswer(data) {
            const section = document.getElementById('answerSection');
            const content = document.getElementById('answerContent');
            
            section.classList.remove('hidden');
            content.innerHTML = `<div class="fade-in">${formatAnswer(data.answer)}</div>`;
        }

        function displaySources(sources) {
            const section = document.getElementById('sourcesSection');
            const content = document.getElementById('sourcesContent');
            const count = document.getElementById('sourceCount');
            
            if (!sources || sources.length === 0) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            count.textContent = `共 ${sources.length} 个来源`;

            content.innerHTML = sources.map((source, index) => {
                if (source.type === 'entity') {
                    return `
                        <div class="source-card bg-blue-50 border-l-4 border-blue-500 rounded-lg p-4 fade-in">
                            <div class="flex items-start justify-between">
                                <div class="flex-1">
                                    <div class="flex items-center space-x-2 mb-2">
                                        <span class="text-xs font-semibold text-blue-600 bg-blue-100 px-2 py-1 rounded">实体</span>
                                        <span class="font-medium text-gray-800">${source.name}</span>
                                        <span class="text-sm text-gray-500">(${source.type})</span>
                                    </div>
                                    <p class="text-sm text-gray-600">${source.text_description || '暂无描述'}</p>
                                </div>
                                <div class="ml-4 text-right">
                                    <div class="text-sm font-semibold text-blue-600">${(source.similarity * 100).toFixed(1)}%</div>
                                    <div class="text-xs text-gray-500">相似度</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (source.type === 'relationship') {
                    return `
                        <div class="source-card bg-green-50 border-l-4 border-green-500 rounded-lg p-4 fade-in">
                            <div class="flex items-start justify-between">
                                <div class="flex-1">
                                    <div class="flex items-center space-x-2 mb-2">
                                        <span class="text-xs font-semibold text-green-600 bg-green-100 px-2 py-1 rounded">关系</span>
                                        <span class="font-medium text-gray-800">${source.source} ${source.type} ${source.target}</span>
                                    </div>
                                    <p class="text-sm text-gray-600">${source.relationship_text || '暂无描述'}</p>
                                </div>
                                <div class="ml-4 text-right">
                                    <div class="text-sm font-semibold text-green-600">${(source.similarity * 100).toFixed(1)}%</div>
                                    <div class="text-xs text-gray-500">相似度</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        function formatAnswer(answer) {
            return answer
                .replace(/\n\n/g, '</p><p class="mt-4">')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }

        async function clearConversation() {
            if (!confirm('确定要清空对话历史吗？')) {
                return;
            }

            try {
                const response = await fetch('/api/clear-conversation', {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('conversationHistory').innerHTML = '<p class="text-sm text-gray-500 text-center py-4">暂无对话历史</p>';
                    alert('对话历史已清空');
                } else {
                    alert('清空失败: ' + data.message);
                }
            } catch (error) {
                alert('清空失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
